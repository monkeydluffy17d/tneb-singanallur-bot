name: TNEB Singanallur Check

on:
  schedule:
    # Runs at 11:30 AM, 3:30 PM, and 6:30 PM Indian Standard Time (IST) daily.
    # GitHub uses UTC time, so we adjust by subtracting 5.5 hours:
    - cron: '40 9,6,10,13 * * *'
  workflow_dispatch: # This adds a magic "Run manually" button so you can test it anytime!

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Project Dependencies
      run: |
        pip install -r requirements.txt

    - name: Execute Captcha Bypass Scraper
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python scraper.py
