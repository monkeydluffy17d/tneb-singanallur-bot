// Cloudflare Worker — Telegram /checkpower command -> GitHub Actions trigger
//
// Required Worker secrets (Settings -> Variables and Secrets in the dashboard):
//   TELEGRAM_BOT_TOKEN   - same bot token you already use for alerts
//   GITHUB_PAT           - fine-grained PAT with Actions: Read & write on this repo
//   ALLOWED_CHAT_ID      - your Telegram chat id, so randoms can't trigger your workflow
//
// These three are NOT secret - just your repo details, hardcoded directly below.
// You only need to edit them here if you rename the repo or the workflow file.
const GITHUB_OWNER = "monkeydluffy17d";
const GITHUB_REPO = "tneb-singanallur-bot";
const WORKFLOW_FILE = "power_check.yml";

export default {
  async fetch(request, env) {
    if (request.method !== "POST") {
      return new Response("OK - webhook alive", { status: 200 });
    }

    let update;
    try {
      update = await request.json();
    } catch {
      return new Response("bad request", { status: 400 });
    }

    const message = update.message;
    if (!message || !message.text) {
      return new Response("ignored", { status: 200 });
    }

    const chatId = String(message.chat.id);
    const text = message.text.trim();

    // Security: only respond to your own chat id
    if (chatId !== env.ALLOWED_CHAT_ID) {
      return new Response("ignored (unauthorized chat)", { status: 200 });
    }

    if (text === "/checkpower") {
      const dispatchUrl = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/actions/workflows/${WORKFLOW_FILE}/dispatches`;

      const ghResponse = await fetch(dispatchUrl, {
        method: "POST",
        headers: {
          "Authorization": `Bearer ${env.GITHUB_PAT}`,
          "Accept": "application/vnd.github+json",
          "User-Agent": "tneb-cpr-worker",
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ ref: "main" })
      });

      const okMsg = ghResponse.status === 204
        ? "✅ Workflow triggered — check will run in a few seconds."
        : `⚠️ GitHub API returned status ${ghResponse.status}. Check PAT permissions.`;

      await sendTelegramMessage(env, chatId, okMsg);
      return new Response("dispatched", { status: 200 });
    }

    return new Response("ignored (no matching command)", { status: 200 });
  }
};

async function sendTelegramMessage(env, chatId, text) {
  const url = `https://api.telegram.org/bot${env.TELEGRAM_BOT_TOKEN}/sendMessage`;
  await fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ chat_id: chatId, text })
  });
}
